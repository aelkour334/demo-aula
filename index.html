<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Aulas</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
  text-align: center;
  width: 300px;
}

h1 {
  margin-bottom: 10px;
}

.subtitle {
  color: gray;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn-open {
  background-color: #28a745;
  color: white;
}

.btn-close {
  background-color: #dc3545;
  color: white;
}

button:hover {
  opacity: 0.9;
}

#mensaje {
  margin-top: 15px;
  font-weight: bold;
  color: #333;
}

.historial {
  margin-top: 20px;
  text-align: left;
  max-height: 150px;
  overflow-y: auto;
}

.historial li {
  font-size: 14px;
  padding: 5px 0;
  border-bottom: 1px solid #eee;
}
</style>

</head>

<body>

<div class="container">
  <h1>Aula A102</h1>
  <p class="subtitle">Sistema de control de accesos</p>

  <button class="btn-open" onclick="registrar('Apertura')">
    Abrir Aula
  </button>

  <button class="btn-close" onclick="registrar('Cierre')">
    Cerrar Aula
  </button>

  <p id="mensaje"></p>

  <div class="historial">
    <ul id="lista"></ul>
  </div>
</div>

<script>
function registrar(tipo) {
    let fecha = new Date().toLocaleString();

    document.getElementById("mensaje").innerText =
        tipo + " registrada correctamente";

    let item = document.createElement("li");
    item.textContent = tipo + " - " + fecha;

    document.getElementById("lista").appendChild(item);
}
</script>

</body>
</html>
