<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Aulas</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
  width: 320px;
  text-align: center;
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}

.btn-login {
  background-color: #007bff;
  color: white;
}

.btn-open {
  background-color: #28a745;
  color: white;
}

.btn-close {
  background-color: #dc3545;
  color: white;
}

.btn-logout {
  background-color: #6c757d;
  color: white;
}

.hidden {
  display: none;
}

#error {
  color: red;
  font-size: 14px;
}

#mensaje {
  margin-top: 15px;
  font-weight: bold;
}

.usuario {
  font-size: 14px;
  color: gray;
  margin-bottom: 10px;
}

ul {
  text-align: left;
  max-height: 120px;
  overflow-y: auto;
}
</style>

</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <h2>Acceso al sistema</h2>
    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn-login" onclick="login()">Iniciar sesión</button>
    <p id="error"></p>
  </div>

  <!-- SISTEMA -->
  <div id="sistema" class="hidden">
    <h2>Aula A102</h2>
    <p class="usuario" id="userLabel"></p>

    <button class="btn-open" onclick="registrar('Apertura')">
      Abrir Aula
    </button>

    <button class="btn-close" onclick="registrar('Cierre')">
      Cerrar Aula
    </button>

    <button class="btn-logout" onclick="logout()">
      Cerrar sesión
    </button>

    <p id="mensaje"></p>

    <h3>Historial</h3>
    <ul id="lista"></ul>
  </div>

</div>

<script>

// Usuarios simulados
const usuarios = {
  "profesor": "1234",
  "admin": "admin",
  "alumno": "1234"
};

function login() {
    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("password").value;

    if (!usuarios[user] || usuarios[user] !== pass) {
        document.getElementById("error").innerText = "Credenciales incorrectas";
        return;
    }

    // Bloqueo alumnos
    if (user === "alumno") {
        document.getElementById("error").innerText = "Acceso denegado";
        return;
    }

    // Login correcto
    document.getElementById("login").style.display = "none";
    document.getElementById("sistema").style.display = "block";

    document.getElementById("userLabel").innerText =
        "Usuario: " + user;
}

function registrar(tipo) {
    let fecha = new Date().toLocaleString();

    document.getElementById("mensaje").innerText =
        tipo + " registrada correctamente";

    let item = document.createElement("li");
    item.textContent = tipo + " - " + fecha;

    document.getElementById("lista").appendChild(item);
}

function logout() {
    document.getElementById("login").style.display = "block";
    document.getElementById("sistema").style.display = "none";
    document.getElementById("usuario").value = "";
    document.getElementById("password").value = "";
    document.getElementById("mensaje").innerText = "";
    document.getElementById("error").innerText = "";
}

</script>

</body>
</html>
